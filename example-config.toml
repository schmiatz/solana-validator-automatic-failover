# Solana Automatic Failover — Example Configuration
#
# CLI flags override TOML values.
#
# This file has three main areas:
#   1. Monitoring      — what to watch and when to trigger
#   2. Local host      — the STANDBY machine where this tool runs
#   3. Remote host     — the ACTIVE validator (SSH fencing / STONITH)
#
# Client-specific fields (Agave vs Frankendancer) are split in sections 2 and 3.
# Uncomment exactly ONE local client block and match the remote block to how the
# active validator is run.
#
# Fencing is "fully configured" when ALL of these are set:
#   remote-ssh + remote-identity-keypair + (remote-ledger OR remote-fdctl-config)
# Without fencing, failover only proceeds when the active node's TPU is unreachable.


# =============================================================================
# 1. MONITORING
# =============================================================================

# Required. Vote account public key to monitor.
vote-pubkey = "YourVoteAccountPubkeyHere1111111111111111111111"

# Optional. Local RPC endpoint. Default: http://127.0.0.1:8899
rpc = "http://127.0.0.1:8899"

# Optional. Max slots behind before triggering failover. Default: 0 (delinquency only).
max-vote-latency = 0

# Optional. Consecutive RPC checks before confirming failover. Default: 3 (1s apart).
retry-count = 3


# =============================================================================
# 2. LOCAL HOST — standby machine (this tool runs here)
# =============================================================================
#
# The spare must run an UNSTAKED identity today. identity-keypair is the staked
# key file used on failover (must match the vote account's validator identity).
#
# Pick Agave OR Frankendancer — required fields differ.


# --- Required (all setups) ---

identity-keypair = "/home/sol/staked-identity.json"


# --- Agave standby (uncomment and set ledger) ---

ledger = "/home/sol/ledger"


# --- Frankendancer standby (uncomment fdctl-config; comment out ledger above if unused) ---
#
# fdctl-config = "/home/sol/fdctl-config.toml"
#
# If the ACTIVE node is Agave and you use SSH fencing, also set ledger locally
# (tower file is copied here on failover). Startup Tower check requires BOTH
# ledger (local) and remote-ledger when fencing is configured.


# =============================================================================
# 3. REMOTE HOST — active validator (SSH fencing / STONITH)
# =============================================================================
#
# Used when the active validator is still alive (TPU reachable). The tool SSHes
# in, switches the active node to an unstaked key, optionally copies the tower
# file, then switches identity locally on this standby.
#
# remote-ssh defaults to user@gossip-ip if omitted (same user as this machine).


# --- SSH connection (all fenced setups) ---

# remote-ssh = "sol@10.0.0.1"
# ssh-key = "/home/sol/.ssh/id_ed25519"
ssh-port = 22
ssh-timeout = 5
ssh-retries = 2

# Path on the ACTIVE node to the unstaked keypair (required for fencing).
remote-identity-keypair = "/home/sol/unstaked-identity.json"


# --- Active validator runs Agave (uncomment remote-ledger) ---

remote-ledger = "/home/sol/ledger"

# Optional if agave-validator is not on PATH over non-interactive SSH:
# remote-agave-bin = "/home/sol/.local/share/solana/install/active_release/bin/agave-validator"


# --- Active validator runs Frankendancer (uncomment remote-fdctl-config; comment remote-ledger if unused) ---
#
# remote-fdctl-config = "/home/sol/fdctl-config.toml"
#
# Optional if fdctl is not on PATH over non-interactive SSH (often set only in ~/.bashrc).
# Auto-discovery tries ~/firedancer/build/native/gcc/bin/fdctl when this is unset.
# remote-fdctl-bin = "/home/sfadmin/firedancer/build/native/gcc/bin/fdctl"


# =============================================================================
# 4. HOOKS (optional)
# =============================================================================
#
# Bash commands via "bash -l -c" (login shell). Environment variables:
#   FAILOVER_REASON, FAILOVER_VOTE_PUBKEY, FAILOVER_ACTIVE_NODE, FAILOVER_ACTIVE_IP,
#   FAILOVER_LOCAL_IDENTITY, FAILOVER_NEW_IDENTITY, FAILOVER_HOSTNAME
#
# pre-failover-hook  — runs before Phase 1 (TPU probe / SSH fence). Non-zero exit ABORTS.
# post-failover-hook — runs after successful local set-identity. Failures are logged only.

# pre-failover-hook = "echo 'Pre-failover: reason=$FAILOVER_REASON active=$FAILOVER_ACTIVE_NODE'"
# post-failover-hook = "echo 'Post-failover: now running as $FAILOVER_NEW_IDENTITY'"


# =============================================================================
# 5. ALERTING (optional)
# =============================================================================

# pagerduty-key = "your-pagerduty-routing-key"
# webhook-url = "https://hooks.slack.com/services/xxx/yyy/zzz"
# webhook-body = '{"text":"{transition} Failover {status}: {reason}"}'


# =============================================================================
# 6. LOGGING (optional)
# =============================================================================

# log = "/var/log/failover.log"


# =============================================================================
# QUICK REFERENCE — minimum fields when SSH fencing is enabled
# =============================================================================
#
# Always: identity-keypair, remote-identity-keypair, remote-ssh (or auto from gossip)
#
# Local Agave  + active Agave:  ledger, remote-ledger
# Local Agave  + active FD:     ledger, remote-fdctl-config, remote-ledger *
# Local FD     + active FD:     fdctl-config, remote-fdctl-config, ledger *, remote-ledger *
# Local FD     + active Agave:  fdctl-config, ledger, remote-ledger
#
# * Tower startup check requires BOTH ledger and remote-ledger whenever fencing
#   is configured (tower copy is Agave-format). Set ledger paths even on FD-only
#   pairs if you need that check to pass.
