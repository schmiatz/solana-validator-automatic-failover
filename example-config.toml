# Solana Automatic Failover — Example Configuration
#
# CLI flags override TOML values.
#
# How to use this file:
#   1. Fill in MONITORING (always)
#   2. Uncomment ONE local block  — how the STANDBY runs (Agave or Frankendancer)
#   3. Fill in REMOTE SSH + identity-keypair (always when using fencing)
#   4. Uncomment ONE remote block — how the ACTIVE validator runs (Agave or Frankendancer)
#
# Fencing is fully configured when: remote-ssh + remote-identity-keypair +
#   (remote-ledger for Agave active  OR  remote-fdctl-config for FD active).
# Tower check (when fencing is on) always needs ledger + remote-ledger on both sides.
# Without fencing, failover only proceeds when the active TPU is unreachable.


# =============================================================================
# 1. MONITORING
# =============================================================================

vote-pubkey = "YourVoteAccountPubkeyHere1111111111111111111111"
rpc = "http://127.0.0.1:8899"
max-vote-latency = 0
retry-count = 3


# =============================================================================
# 2. LOCAL HOST — standby machine (this tool runs here)
# =============================================================================
#
# The spare must run an UNSTAKED identity today.
# identity-keypair = staked key file used on failover (must match vote account).
#
# Uncomment exactly ONE block.


# --- Local Agave ---
#
# identity-keypair = "/home/sol/staked-identity.json"
# ledger = "/home/sol/ledger"


# --- Local Frankendancer ---
#
# identity-keypair = "/home/sol/staked-identity.json"
# fdctl-config = "/home/sol/fdctl-config.toml"
# ledger = "/home/sol/ledger"              # also set when SSH fencing is on (tower copy destination)


# =============================================================================
# 3. REMOTE HOST — active validator (SSH fencing / STONITH)
# =============================================================================
#
# Required whenever the active validator may still be alive (TPU reachable).
# remote-ssh can be omitted to auto-detect user@gossip-ip (same user as this machine).


remote-ssh = "sol@10.0.0.1"
ssh-key = "/home/sol/.ssh/id_ed25519"
ssh-port = 22
ssh-timeout = 5
ssh-command-timeout = 3
ssh-retries = 2

# Unstaked keypair path on the ACTIVE node (switched to during fencing).
remote-identity-keypair = "/home/sol/unstaked-identity.json"


# --- Active Agave ---
#
# remote-ledger = "/home/sol/ledger"
# remote-agave-bin = "/home/sol/.local/share/solana/install/active_release/bin/agave-validator"  # optional


# --- Active Frankendancer ---
#
# remote-fdctl-config = "/home/sol/fdctl-config.toml"
# remote-ledger = "/home/sol/ledger"                                     # tower source (required for Tower check when fencing is on)
# remote-fdctl-bin = "/home/sol/firedancer/build/native/gcc/bin/fdctl"  # optional; auto-probes ~/firedancer/.../fdctl if unset


# =============================================================================
# 4. HOOKS (optional)
# =============================================================================
#
# pre-failover-hook  — before Phase 1 (TPU probe / SSH fence). Non-zero exit ABORTS.
# post-failover-hook — after successful local set-identity. Failures logged only.
#
# Env: FAILOVER_REASON, FAILOVER_VOTE_PUBKEY, FAILOVER_ACTIVE_NODE, FAILOVER_ACTIVE_IP,
#      FAILOVER_LOCAL_IDENTITY, FAILOVER_NEW_IDENTITY, FAILOVER_HOSTNAME

# pre-failover-hook = "echo 'Pre-failover: reason=$FAILOVER_REASON'"
# post-failover-hook = "echo 'Post-failover: now running as $FAILOVER_NEW_IDENTITY'"


# =============================================================================
# 5. ALERTING (optional)
# =============================================================================

# pagerduty-key = "your-pagerduty-routing-key"
# webhook-url = "https://hooks.slack.com/services/xxx/yyy/zzz"
# webhook-body = '{"text":"{transition} Failover {status}: {reason}"}'


# =============================================================================
# 6. LOGGING (optional)
# =============================================================================

# log = "/var/log/failover.log"


# =============================================================================
# SETUP CHEAT SHEET (SSH fencing enabled)
# =============================================================================
#
#  Standby      Active       Local fields                         Remote fields
#  ─────────────────────────────────────────────────────────────────────────────
#  Agave        Agave        identity-keypair, ledger             remote-ledger
#  Agave        Frankendancer identity-keypair, ledger          remote-fdctl-config, remote-ledger
#  Frankendancer Agave       identity-keypair, fdctl-config, ledger  remote-ledger
#  Frankendancer Frankendancer identity-keypair, fdctl-config, ledger  remote-fdctl-config, remote-ledger
#
#  Tower copy uses Agave-format tower-1_9-<identity>.bin from remote-ledger on the active node.
